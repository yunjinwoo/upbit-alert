<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 원본 데이터 확인</title>
    <!-- CSS (Bootstrap & DataTables) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        .dashboard-container { margin-top: 30px; margin-bottom: 50px; }
        .json-block {
            background-color: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            display: none; /* 기본적으로 숨김 */
        }
        .header-title { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .timestamp-badge { font-size: 1.1rem; }
        .card-header { cursor: pointer; user-select: none; } /* 헤더 클릭 가능 표시 */
        .card-header:hover { background-color: #343a40 !important; }
    </style>
</head>
<body>

<div class="container dashboard-container">
    <div class="header-title">
        <h2>🛠️ 주식 원본 데이터 확인 (최근 데이터)</h2>
        <div>
            <span id="update-timer" class="badge bg-secondary">로딩 중...</span>
            <button onclick="loadData()" class="btn btn-primary btn-sm ms-2">새로고침</button>
            <a href="/" class="btn btn-outline-secondary btn-sm ms-1">대시보드로 돌아가기</a>
        </div>
    </div>

    <div id="data-container">
        <!-- 데이터가 여기에 동적으로 추가됩니다 -->
    </div>
</div>

<script>
    function toggleData(id) {
        const el = document.getElementById(`json-${id}`);
        if (el.style.display === 'none') {
            el.style.display = 'block';
        } else {
            el.style.display = 'none';
        }
    }

    async function loadData() {
        const container = document.getElementById('data-container');
        container.innerHTML = '<div class="text-center"><div class="spinner-border text-primary" role="status"></div><p>데이터를 불러오는 중...</p></div>';

        try {
            const response = await fetch('/api/stock-raw-data');
            const result = await response.json();

            if (result.status !== 'success') {
                container.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
                return;
            }

            if (result.data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">저장된 원본 데이터가 없습니다.</div>';
                return;
            }

            let html = '';
            result.data.forEach((item, index) => {
                const formattedJson = JSON.stringify(item.raw_data, null, 4);
                // api_type이 없으면 'Unknown API', 있으면 해당 텍스트
                const apiType = item.api_type ? item.api_type : 'Unknown API';

                html += `
                    <div class="card mb-3 shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center" onclick="toggleData(${index})">
                            <div>
                                <span class="badge bg-info me-2 text-dark">${apiType}</span>
                                <span class="timestamp-badge">🕒 수집 시간: <b>${item.timestamp}</b></span>
                            </div>
                            <div>
                                <span class="badge bg-primary rounded-pill me-3">데이터 ${item.raw_data.length}건</span>
                                <span>▼ 펼치기</span>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <pre class="json-block m-0" id="json-${index}">${formattedJson}</pre>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('update-timer').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="alert alert-danger">데이터를 불러오는데 실패했습니다: ${e.message}</div>`;
        }
    }

    document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
