<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 주식 시가총액 순위 추이</title>
    <!-- CSS (Bootstrap & DataTables) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        .dashboard-container { margin-top: 30px; margin-bottom: 50px; }
        .header-title { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .table-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .up-rate { color: #d60000; font-weight: bold; }
        .down-rate { color: #0049af; font-weight: bold; }
        .ticker-link { text-decoration: none; color: #0049af; font-weight: bold; cursor: pointer; }
        .ticker-link:hover { text-decoration: underline; }
        .rank-badge { font-size: 0.9rem; padding: 0.3em 0.6em; }
    </style>
</head>
<body>

<div class="container dashboard-container">
    <div class="header-title">
        <h2>📊 한국 주식 일별 시가총액 순위</h2>
        <div>
            <span id="update-timer" class="badge bg-secondary">로딩 중...</span>
            <button onclick="fetchNow()" class="btn btn-warning btn-sm ms-2 text-dark">즉시 수집</button>
            <button onclick="loadData()" class="btn btn-primary btn-sm ms-1">새로고침</button>
            <a href="/" class="btn btn-outline-secondary btn-sm ms-1">대시보드로 돌아가기</a>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <div class="input-group">
                <span class="input-group-text">특정 종목 조회</span>
                <input type="text" id="searchInput" class="form-control" placeholder="종목코드 (예: 005930)" onkeypress="if(event.keyCode==13) loadData()">
                <button class="btn btn-outline-secondary" type="button" onclick="loadData()">조회</button>
                <button class="btn btn-outline-danger" type="button" onclick="clearSearch()">초기화</button>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table id="marketCapTable" class="table table-hover" style="width:100%">
            <thead class="table-light">
                <tr>
                    <th>날짜</th>
                    <th>순위</th>
                    <th>종목명 (코드)</th>
                    <th>시가총액 (억 원)</th>
                    <th>현재가</th>
                    <th>등락률</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 데이터가 동적으로 추가됩니다 -->
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    let dataTable;

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        loadData();
    }

    async function fetchNow() {
        if(!confirm("KIS API를 호출하여 시가총액 데이터를 지금 수집하시겠습니까? (당일 데이터는 덮어씌워집니다)")) return;

        try {
            const btn = document.querySelector('button[onclick="fetchNow()"]');
            const originalText = btn.innerText;
            btn.innerText = "수집 중...";
            btn.disabled = true;

            const response = await fetch('/api/market-cap/fetch', { method: 'POST' });
            const result = await response.json();

            btn.innerText = originalText;
            btn.disabled = false;

            if (result.status === 'success') {
                alert(result.message);
                loadData();
            } else {
                alert("수집 실패: " + result.message);
            }
        } catch (e) {
            console.error(e);
            alert("서버 오류가 발생했습니다.");

            const btn = document.querySelector('button[onclick="fetchNow()"]');
            btn.innerText = "즉시 수집";
            btn.disabled = false;
        }
    }

    async function loadData() {
        const searchCode = document.getElementById('searchInput').value.trim();
        let url = '/api/market-cap';
        if (searchCode) {
            url += `?code=${searchCode}`;
        }

        try {
            const response = await fetch(url);
            const result = await response.json();
            if (result.status !== 'success') return;

            if (dataTable) dataTable.destroy();

            const tableBody = document.getElementById('tableBody');

            tableBody.innerHTML = result.data.map(item => {
                // 시가총액은 단위가 크므로 억 원 단위로 파싱 표시 (API 응답 기준에 따라 다를 수 있음. 기본은 그대로 표시 후 콤마)
                const mCap = parseInt(item.market_cap_amount).toLocaleString();
                const price = parseInt(item.price).toLocaleString();
                const rate = parseFloat(item.change_rate);
                const rateClass = rate > 0 ? 'up-rate' : (rate < 0 ? 'down-rate' : '');

                return `
                    <tr>
                        <td><b>${item.date}</b></td>
                        <td><span class="badge bg-dark rank-badge">${item.rank}위</span></td>
                        <td>
                            <a href="https://finance.naver.com/item/main.nhn?code=${item.code}" target="_blank" class="ticker-link">
                                ${item.name} <small class="text-muted">(${item.code})</small>
                            </a>
                        </td>
                        <td>${mCap}</td>
                        <td>${price}원</td>
                        <td><span class="${rateClass}">${rate}%</span></td>
                    </tr>
                `;
            }).join('');

            // 종목 검색 시 날짜순 오름차순, 전체 조회 시 날짜 내림차순 -> 순위 오름차순
            const orderOption = searchCode ? [[0, 'desc']] : [[0, 'desc'], [1, 'asc']];

            dataTable = $('#marketCapTable').DataTable({
                order: orderOption,
                pageLength: 50,
                language: {
                    search: "결과 내 검색:",
                    lengthMenu: "_MENU_ 개씩 보기",
                    info: "총 _TOTAL_ 건 중 _START_~_END_ 표시"
                }
            });
            document.getElementById('update-timer').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            console.error(e);
            alert('데이터를 불러오는데 실패했습니다.');
        }
    }

    document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
