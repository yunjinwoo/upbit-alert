name: Deploy to iwinv

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행됩니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}        # GitHub Secrets에 등록한 서버 IP
          username: ${{ secrets.SERVER_USER }}  # GitHub Secrets에 등록한 'deploy-user'
          key: ${{ secrets.SSH_PRIVATE_KEY }}    # GitHub Secrets에 등록한 id_ed25519 비밀키
          port: 22                             # iwinv 기본 SSH 포트
          script: |
            # 1. 프로젝트 폴더로 이동 (폴더가 없으면 생성)
            mkdir -p ~/upbit-alert
            cd ~/upbit-alert
            
            # 2. 소스 코드 업데이트
            # 서버에 이미 .git 설정이 되어있다고 가정합니다. 
            # 만약 처음이라면 서버에서 한 번 'git clone'을 직접 수행해야 합니다.
            git pull origin main
            
            # 3. 필요한 라이브러리 설치
            pip install -r requirements.txt
            
            # 4. PM2를 이용한 프로세스 재시작
            # pm2가 설치되어 있어야 하며, 최초 1회는 pm2 start로 실행해두어야 합니다.
            # 가상환경 내의 python 경로를 사용합니다.
            pm2 restart upbit-bot || pm2 start main.py --interpreter ./venv/bin/python3 --name upbit-bot
            pm2 restart upbit-api || pm2 start api_server.py --interpreter ./venv/bin/python3 --name upbit-api
            pm2 restart stock-bot || pm2 start main_stocks.py --interpreter ./venv/bin/python3 --name stock-bot
            
            # 5. 최종 상태 확인 (로그에서 잘 보이도록 줄바꿈과 구분선 추가)
            #echo "==================== DEPLOYMENT STATUS ===================="
            #pm2 list --no-color
            #echo "==========================================================="
            
            #pm2 prettylist
