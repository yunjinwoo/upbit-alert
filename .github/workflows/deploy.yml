name: Deploy to iwinv

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행됩니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}        # GitHub Secrets에 등록한 서버 IP
          username: ${{ secrets.SERVER_USER }}  # GitHub Secrets에 등록한 'deploy-user'
          key: ${{ secrets.SSH_PRIVATE_KEY }}    # GitHub Secrets에 등록한 id_ed25519 비밀키
          port: 22                             # iwinv 기본 SSH 포트
          script: |
            # 1. 프로젝트 폴더로 이동 (폴더가 없으면 생성)
            mkdir -p ~/upbit-alert
            cd ~/upbit-alert
            
            # 2. 소스 코드 업데이트 (강제 업데이트 방식)
            git fetch --all
            git reset --hard origin/main
            
            # 3. 필요한 라이브러리 설치
            pip install -r requirements.txt
            
            # 4. PM2를 이용한 프로세스 재시작
            # 기존 프로세스가 있다면 중지 후 삭제 (확실한 재시작을 위해)
            pm2 delete upbit-bot upbit-api stock-bot || true
            
            # 가상환경 내의 python3 경로를 정확히 지정하여 실행
            pm2 start main.py --interpreter ./venv/bin/python3 --name upbit-bot
            pm2 start api_server.py --interpreter ./venv/bin/python3 --name upbit-api
            pm2 start main_stocks.py --interpreter ./venv/bin/python3 --name stock-bot
            
            # 5. 설정 저장 (서버 재부팅 시 자동 실행)
            pm2 save
            
            # 5. 최종 상태 확인 (로그에서 잘 보이도록 줄바꿈과 구분선 추가)
            #echo "==================== DEPLOYMENT STATUS ===================="
            pm2 list --no-color
            #echo "==========================================================="
            
            #pm2 prettylist
